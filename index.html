<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>World Soccer Champions</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; font-family: 'Arial Black', Arial, sans-serif;
      overflow: hidden; touch-action: none;
    }
    #game-container {
      width: 390px; height: 844px;
      position: relative; overflow: hidden;
      background: #1a1a2e; border-radius: 20px;
      box-shadow: 0 0 40px rgba(0,0,0,0.8);
    }
    canvas { display: block; width: 100%; height: 100%; }

    /* HUD */
    #hud {
      position: absolute; top: 0; left: 0; right: 0;
      display: flex; flex-direction: column; pointer-events: none;
      z-index: 10;
    }
    #crowd-bar {
      width: 100%; height: 60px;
      background: linear-gradient(180deg, #555 0%, #888 100%);
      overflow: hidden; position: relative;
    }
    #score-bar {
      background: linear-gradient(90deg, #f5a623 0%, #f7c948 50%, #f5a623 100%);
      padding: 6px 10px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .stars-container { display: flex; gap: 8px; align-items: center; }
    .star-milestone {
      display: flex; flex-direction: column; align-items: center;
      font-size: 11px; font-weight: 900; color: #333;
    }
    .star { font-size: 22px; line-height: 1; transition: all .3s; }
    .star.filled { filter: drop-shadow(0 0 4px #ff0); }
    .star.empty { filter: grayscale(1) brightness(0.6); }
    #ball-counter {
      background: #2ecc40; border-radius: 50%;
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 900; color: white;
      border: 3px solid #fff; box-shadow: 0 2px 6px rgba(0,0,0,.4);
    }
    #coins-display {
      position: absolute; top: 70px; right: 10px;
      background: rgba(0,0,0,.6); border-radius: 20px;
      padding: 4px 10px; display: flex; align-items: center; gap: 4px;
      color: #FFD700; font-size: 14px; font-weight: 900; z-index: 15;
    }

    /* DISTANCE */
    #distance-label {
      position: absolute; bottom: 110px; left: 14px;
      color: white; font-size: 28px; font-weight: 900;
      text-shadow: 2px 2px 8px #000; z-index: 15; pointer-events: none;
    }

    /* OVERLAYS */
    .overlay {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 50; background: rgba(0,0,0,.7);
    }
    .panel {
      background: linear-gradient(160deg, #0099ff 0%, #003399 100%);
      border-radius: 20px; padding: 30px 40px;
      text-align: center; border: 4px solid #fff;
      box-shadow: 0 10px 40px rgba(0,0,0,.6); max-width: 320px;
    }
    .panel h2 { color: #FFD700; font-size: 22px; text-transform: uppercase; margin-bottom: 8px; }
    .panel h3 { color: white; font-size: 18px; margin-bottom: 20px; }
    .btn {
      display: block; width: 100%; padding: 14px;
      border: none; border-radius: 12px; font-size: 18px;
      font-weight: 900; cursor: pointer; margin-top: 12px;
      text-transform: uppercase; letter-spacing: 1px;
      transition: transform .1s, box-shadow .1s;
    }
    .btn:active { transform: scale(.96); box-shadow: none; }
    .btn-green {
      background: linear-gradient(180deg, #2ecc40 0%, #27ae60 100%);
      color: white; box-shadow: 0 4px 0 #1a8040;
    }
    .btn-blue {
      background: linear-gradient(180deg, #3498db 0%, #2070b0 100%);
      color: white; box-shadow: 0 4px 0 #1a5080; font-size: 15px;
    }
    .btn-orange {
      background: linear-gradient(180deg, #f39c12 0%, #e67e22 100%);
      color: white; box-shadow: 0 4px 0 #b85c10;
    }

    /* SCORE ZONES */
    #zone-hint {
      position: absolute; bottom: 115px; right: 10px;
      z-index: 15; font-size: 11px; color: rgba(255,255,255,.8);
      text-shadow: 1px 1px 3px #000; pointer-events: none;
      background: rgba(0,0,0,.4); border-radius: 8px; padding: 4px 8px;
    }

    /* FLOATING SCORE */
    .float-score {
      position: absolute; font-size: 36px; font-weight: 900;
      color: #FFD700; text-shadow: 2px 2px 8px #000;
      pointer-events: none; z-index: 60; animation: floatUp .9s ease-out forwards;
    }
    @keyframes floatUp {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-80px) scale(1.4); }
    }

    /* AIM ARROW */
    #aim-arrow {
      position: absolute; pointer-events: none; z-index: 20;
      display: none;
    }

    /* POWER BAR */
    #power-wrap {
      position: absolute; bottom: 108px; left: 50%; transform: translateX(-50%);
      width: 200px; z-index: 20; display: none; flex-direction: column; align-items: center;
    }
    #power-label { color: white; font-size: 12px; font-weight: 700; margin-bottom: 4px; text-shadow: 1px 1px 3px #000; }
    #power-bar-bg {
      width: 100%; height: 14px; background: rgba(0,0,0,.5);
      border-radius: 7px; border: 2px solid white; overflow: hidden;
    }
    #power-bar-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #2ecc40, #f5a623, #e74c3c);
      border-radius: 7px; transition: width .05s linear;
    }

    /* GOAL FLASH */
    #flash { position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 55; pointer-events: none; display: none; border-radius: 20px; }

    /* MESSAGE */
    #msg {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      z-index: 60; pointer-events: none; text-align: center;
      font-size: 52px; font-weight: 900; text-shadow: 3px 3px 0 #000;
      display: none;
    }

    /* RESULT SCREEN */
    #result-stars { display: flex; gap: 16px; justify-content: center; margin: 16px 0 8px; font-size: 40px; }
    #result-coins { font-size: 28px; color: #FFD700; font-weight: 900; margin-bottom: 8px; }
    #result-score { font-size: 22px; color: white; margin-bottom: 16px; }

    /* BALL REWARD */
    .reward-ball {
      width: 100px; height: 100px; border-radius: 50%; margin: 0 auto 16px;
      background: radial-gradient(circle at 35% 35%, #fff 0%, #cc0000 40%, #0033aa 100%);
      border: 4px solid #fff; box-shadow: 0 6px 24px rgba(0,0,0,.5);
      display: flex; align-items: center; justify-content: center;
      font-size: 44px;
    }

    /* FIELD / GOAL ZONES overlay */
    #zone-overlay { position: absolute; z-index: 12; pointer-events: none; display: none; }

    @media (max-height: 800px) {
      #game-container { height: 100vh; border-radius: 0; }
    }
  </style>
</head>
<body>
<div id="game-container">
  <canvas id="canvas"></canvas>

  <!-- HUD -->
  <div id="hud">
    <div id="crowd-bar"></div>
    <div id="score-bar">
      <div class="stars-container" id="stars-row"></div>
      <div id="ball-counter">13</div>
    </div>
  </div>
  <div id="coins-display">🪙 <span id="coins-num">0</span></div>
  <div id="distance-label">16M</div>
  <div id="zone-hint">🎯 Mire nos cantos!</div>

  <!-- POWER BAR -->
  <div id="power-wrap">
    <div id="power-label">POTÊNCIA</div>
    <div id="power-bar-bg"><div id="power-bar-fill"></div></div>
  </div>

  <!-- FLASH -->
  <div id="flash"></div>
  <div id="msg"></div>

  <!-- SCREENS -->
  <div class="overlay" id="screen-start">
    <div class="panel">
      <h2>⚽ World Soccer<br>Champions</h2>
      <p style="color:#cce;font-size:14px;margin-bottom:20px;">Chute a bola nos cantos do gol para fazer mais pontos!</p>
      <button class="btn btn-green" onclick="startGame()">▶ JOGAR</button>
      <div style="margin-top:16px;color:#aac;font-size:12px;">Toque e arraste para mirar • Solte para chutar</div>
    </div>
  </div>

  <div class="overlay" id="screen-goal" style="display:none;background:rgba(0,200,0,.2)">
    <div class="panel">
      <h2 style="font-size:32px;">⚽ GOL!</h2>
      <div id="goal-zone-msg" style="color:#cce;font-size:18px;margin:8px 0;">Zona central</div>
      <div id="goal-pts" style="color:#FFD700;font-size:38px;font-weight:900;margin:8px 0;">+60</div>
      <button class="btn btn-green" onclick="nextKick()">PRÓXIMO ▶</button>
    </div>
  </div>

  <div class="overlay" id="screen-miss" style="display:none;background:rgba(200,0,0,.2)">
    <div class="panel">
      <h2 style="font-size:28px;color:#ff4444;">❌ DEFENDIDO!</h2>
      <p style="color:#cce;font-size:15px;margin:12px 0;">O goleiro defendeu! Tente nos cantos.</p>
      <button class="btn btn-orange" onclick="nextKick()">TENTAR NOVAMENTE ▶</button>
    </div>
  </div>

  <div class="overlay" id="screen-reward" style="display:none">
    <div class="panel">
      <h2>🎁 NOVA BOLA</h2>
      <h3>DESBLOQUEADA!</h3>
      <div class="reward-ball">⭐</div>
      <button class="btn btn-green" onclick="hideReward()">CONTINUE</button>
      <button class="btn btn-blue" onclick="hideReward()" style="margin-top:8px;">🎬 GET IT</button>
    </div>
  </div>

  <div class="overlay" id="screen-result" style="display:none">
    <div class="panel">
      <h2>RESULTADO</h2>
      <div id="result-stars"></div>
      <div id="result-score"></div>
      <div id="result-coins"></div>
      <button class="btn btn-green" onclick="restartGame()">🔄 JOGAR NOVAMENTE</button>
      <button class="btn btn-blue" onclick="nextLevel()" style="margin-top:8px;">⏭ PRÓXIMA FASE</button>
    </div>
  </div>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const LEVELS = [
  { distance: 16, milestones: [75, 125, 200], kicks: 13, label: "16M" },
  { distance: 21, milestones: [75, 150, 270], kicks: 18, label: "21M" },
  { distance: 31, milestones: [75, 150, 270], kicks: 5,  label: "31M" },
];

// ─── STATE ────────────────────────────────────────────────────────────────────
let state = {
  levelIdx: 0, score: 0, kicks: 0, maxKicks: 13, coins: 0,
  phase: 'idle', // idle | aiming | shooting | waiting
  ballX: 0, ballY: 0, ballZ: 0,
  ballVX: 0, ballVY: 0, ballVZ: 0,
  goalkeeperX: 0, goalkeeperDir: 1,
  hasFreeKickWall: false, wallReward: false,
  milestones: [75,125,200],
  starsEarned: 0,
  aimAngle: 0, power: 50,
  rewardShown: false,
  goalResult: null, // {zone, pts}
};

// ─── CANVAS ───────────────────────────────────────────────────────────────────
const gc = document.getElementById('game-container');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
canvas.width = 390; canvas.height = 844;

// ─── UTILS ────────────────────────────────────────────────────────────────────
function lerp(a,b,t){ return a+(b-a)*t; }
function clamp(v,mn,mx){ return Math.max(mn,Math.min(mx,v)); }

// ─── DRAW HELPERS ─────────────────────────────────────────────────────────────
function drawGradRect(x,y,w,h,c1,c2,vert=true){
  const g = vert ? ctx.createLinearGradient(x,y,x,y+h) : ctx.createLinearGradient(x,y,x+w,y);
  g.addColorStop(0,c1); g.addColorStop(1,c2);
  ctx.fillStyle=g; ctx.fillRect(x,y,w,h);
}

function drawRoundRect(x,y,w,h,r,fill,stroke,lw=2){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
  if(fill){ ctx.fillStyle=fill; ctx.fill(); }
  if(stroke){ ctx.strokeStyle=stroke; ctx.lineWidth=lw; ctx.stroke(); }
}

// ─── SCENE CONSTANTS ─────────────────────────────────────────────────────────
const W=390, H=844;
const FIELD_Y = 340;          // where field starts
const GOAL_Y  = 280;          // goal top
const GOAL_H  = 160;          // goal height
const GOAL_W  = 300;          // goal width
const GOAL_X  = (W-GOAL_W)/2; // goal left
const BALL_START_X = W/2;
const BALL_START_Y = H-200;
const BALL_START_Z = 0;

// ─── GOAL ZONE SCORING ───────────────────────────────────────────────────────
// zones: topLeft, topCenter, topRight, midLeft, midRight, midCenter, bottom
function getZoneScore(tx, ty) {
  // tx, ty = target percentage (0..1) within goal
  const isTop = ty < 0.35;
  const isBottom = ty > 0.65;
  const isLeft = tx < 0.25;
  const isRight = tx > 0.75;
  const isCenter = tx >= 0.3 && tx <= 0.7;
  if (isTop && (isLeft || isRight)) return { pts: 90, label: "Ângulo superior! 🔥" };
  if (isTop && isCenter) return { pts: 60, label: "Centro superior!" };
  if (isTop) return { pts: 75, label: "Meia-altura!" };
  if (isBottom && isCenter) return { pts: 30, label: "Centro inferior" };
  if (isLeft || isRight) return { pts: 30, label: "Lateral baixa" };
  return { pts: 45, label: "Centro!" };
}

// ─── GOALKEEPER AI ───────────────────────────────────────────────────────────
function mkGoalkeeper() {
  state.goalkeeperX = GOAL_X + GOAL_W/2;
  state.goalkeeperDir = (Math.random() > .5) ? 1 : -1;
}

function updateGoalkeeper(dt) {
  if (state.phase === 'idle' || state.phase === 'aiming') {
    state.goalkeeperX += state.goalkeeperDir * 80 * dt;
    const margin = 40;
    if (state.goalkeeperX > GOAL_X + GOAL_W - margin) state.goalkeeperDir = -1;
    if (state.goalkeeperX < GOAL_X + margin) state.goalkeeperDir = 1;
  }
}

// ─── SCENE DRAWING ───────────────────────────────────────────────────────────
function drawScene() {
  // sky / background
  drawGradRect(0,60,W,FIELD_Y-60,'#87CEEB','#4a9fd4');
  // stadium seats
  drawStadium();
  // field
  drawField();
  // goal net
  drawGoal();
  // zone overlays (only when aiming)
  if (state.phase==='aiming') drawZoneOverlays();
  // barriers (free kick)
  if (state.hasFreeKickWall) drawWall();
  // goalkeeper
  drawGoalkeeper();
  // ball
  drawBall();
  // player
  if (state.phase!=='shooting') drawPlayer();
  // aim line
  if (state.phase==='aiming') drawAimLine();
}

function drawStadium() {
  // seats gradient
  drawGradRect(0,60,W,110,'#c0392b','#e67e22');
  // crowd dots
  for(let i=0;i<200;i++){
    const x=Math.sin(i*77)*190+195;
    const y=65+Math.cos(i*53)*40;
    ctx.fillStyle=`hsl(${i*37%360},60%,55%)`;
    ctx.beginPath(); ctx.arc(x,y,5,0,Math.PI*2); ctx.fill();
  }
  // banner
  drawGradRect(0,160,W,30,'#e74c3c','#c0392b');
  ctx.fillStyle='#fff'; ctx.font='bold 14px Arial'; ctx.textAlign='center';
  ctx.fillText('WORLD SOCCER CHAMPIONS', W/2, 181);
}

function drawField() {
  drawGradRect(0,FIELD_Y,W,H-FIELD_Y,'#27ae60','#1e8449');
  // field lines
  ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=2;
  // center circle perspective
  ctx.beginPath();
  ctx.ellipse(W/2, FIELD_Y+40, 80, 20, 0, 0, Math.PI*2);
  ctx.stroke();
  // penalty spot
  ctx.fillStyle='white'; ctx.beginPath();
  ctx.arc(W/2, FIELD_Y+30, 4, 0, Math.PI*2); ctx.fill();
}

function drawGoal() {
  const gx=GOAL_X, gy=GOAL_Y, gw=GOAL_W, gh=GOAL_H;
  // back net
  ctx.strokeStyle='rgba(255,255,255,0.35)'; ctx.lineWidth=1;
  const cols=16, rows=10;
  for(let c=0;c<=cols;c++){
    const x=gx+c*(gw/cols);
    ctx.beginPath(); ctx.moveTo(x,gy); ctx.lineTo(x+10,gy+gh); ctx.stroke();
  }
  for(let r=0;r<=rows;r++){
    const y=gy+r*(gh/rows);
    ctx.beginPath(); ctx.moveTo(gx,y); ctx.lineTo(gx+gw+10*r/rows,y); ctx.stroke();
  }
  // posts
  ctx.strokeStyle='white'; ctx.lineWidth=5;
  // left post
  ctx.beginPath(); ctx.moveTo(gx,FIELD_Y); ctx.lineTo(gx,gy); ctx.stroke();
  // right post
  ctx.beginPath(); ctx.moveTo(gx+gw,FIELD_Y); ctx.lineTo(gx+gw,gy); ctx.stroke();
  // crossbar
  ctx.beginPath(); ctx.moveTo(gx,gy); ctx.lineTo(gx+gw,gy); ctx.stroke();
}

function drawZoneOverlays() {
  const gx=GOAL_X, gy=GOAL_Y, gw=GOAL_W, gh=GOAL_H;
  const zones=[
    {x:gx,y:gy,w:gw*0.25,h:gh*0.4,pts:90,c:'rgba(231,76,60,0.55)'},
    {x:gx+gw*0.25,y:gy,w:gw*0.5,h:gh*0.4,pts:60,c:'rgba(52,152,219,0.45)'},
    {x:gx+gw*0.75,y:gy,w:gw*0.25,h:gh*0.4,pts:90,c:'rgba(231,76,60,0.55)'},
    {x:gx,y:gy+gh*0.4,w:gw*0.3,h:gh*0.6,pts:30,c:'rgba(231,76,60,0.35)'},
    {x:gx+gw*0.3,y:gy+gh*0.4,w:gw*0.4,h:gh*0.6,pts:30,c:'rgba(46,204,113,0.35)'},
    {x:gx+gw*0.7,y:gy+gh*0.4,w:gw*0.3,h:gh*0.6,pts:30,c:'rgba(231,76,60,0.35)'},
  ];
  ctx.save();
  ctx.font='bold 18px Arial Black'; ctx.textAlign='center'; ctx.textBaseline='middle';
  zones.forEach(z=>{
    ctx.fillStyle=z.c; ctx.fillRect(z.x,z.y,z.w,z.h);
    ctx.strokeStyle='rgba(255,255,255,0.4)'; ctx.lineWidth=1;
    ctx.strokeRect(z.x,z.y,z.w,z.h);
    ctx.fillStyle='rgba(255,255,255,0.9)';
    ctx.shadowColor='#000'; ctx.shadowBlur=4;
    ctx.fillText(z.pts, z.x+z.w/2, z.y+z.h/2);
  });
  ctx.shadowBlur=0; ctx.restore();
}

function drawWall() {
  const wallX = GOAL_X + GOAL_W*0.3;
  const wallY = FIELD_Y - 90;
  // draw 2 blockers
  for(let i=0;i<2;i++){
    const px = wallX + i*55;
    // body
    drawGradRect(px-18,wallY,36,80,'#8e44ad','#f1c40f');
    // head
    ctx.fillStyle='#f5cba7';
    ctx.beginPath(); ctx.arc(px, wallY-14, 14, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle='#333'; ctx.lineWidth=2; ctx.stroke();
    // jersey detail
    ctx.fillStyle='rgba(255,255,0,.4)';
    ctx.fillRect(px-18,wallY+20,36,20);
  }
}

function drawGoalkeeper() {
  const gkX = state.goalkeeperX;
  const gkY = FIELD_Y - 8;
  ctx.save();
  // body
  drawGradRect(gkX-18,gkY-70,36,70,'#2980b9','#1abc9c');
  // head
  ctx.fillStyle='#f5cba7';
  ctx.beginPath(); ctx.arc(gkX, gkY-80, 14, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle='#333'; ctx.lineWidth=2; ctx.stroke();
  // gloves
  ctx.fillStyle='#f39c12';
  ctx.beginPath(); ctx.arc(gkX-22, gkY-55, 9, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(gkX+22, gkY-55, 9, 0, Math.PI*2); ctx.fill();
  // legs
  ctx.fillStyle='#1a5276';
  ctx.fillRect(gkX-14,gkY-5,13,20); ctx.fillRect(gkX+1,gkY-5,13,20);
  ctx.restore();
}

function drawPlayer() {
  const px=BALL_START_X, py=BALL_START_Y-30;
  ctx.save();
  // jersey argentina stripes
  for(let i=0;i<4;i++){
    ctx.fillStyle=i%2===0?'#74b9ff':'#dfe6e9';
    ctx.fillRect(px-18+i*9,py-70,9,65);
  }
  // head
  ctx.fillStyle='#f5cba7';
  ctx.beginPath(); ctx.arc(px, py-80, 15, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle='#333'; ctx.lineWidth=2; ctx.stroke();
  // hair
  ctx.fillStyle='#2d3436';
  ctx.beginPath(); ctx.arc(px, py-87, 10, Math.PI, 0); ctx.fill();
  // shorts
  ctx.fillStyle='#2c3e50';
  ctx.fillRect(px-18,py-8,36,28);
  // socks/shoes
  ctx.fillStyle='#95a5a6';
  ctx.fillRect(px-16,py+20,13,25); ctx.fillRect(px+3,py+20,13,25);
  ctx.fillStyle='#1a1a1a';
  ctx.fillRect(px-18,py+43,16,8); ctx.fillRect(px+2,py+43,16,8);
  ctx.restore();
}

// Ball rendering with 3D perspective
let ballAnim = { x:BALL_START_X, y:BALL_START_Y, r:18, t:0 };
let shooting = false, shotDone = false;
let shotTargetX=0, shotTargetY=0, shotTime=0, shotDuration=0.7;
let shotGoal=false, shotZone=null;

function drawBall() {
  const b = ballAnim;
  ctx.save();
  // shadow
  const shadowScale = clamp((b.y - GOAL_Y)/(BALL_START_Y - GOAL_Y), 0.1, 1);
  ctx.fillStyle=`rgba(0,0,0,${0.3*shadowScale})`;
  ctx.beginPath();
  ctx.ellipse(b.x, FIELD_Y+2, b.r*shadowScale, b.r*0.3*shadowScale, 0, 0, Math.PI*2);
  ctx.fill();
  // ball gradient
  const grad = ctx.createRadialGradient(b.x-b.r*0.3, b.y-b.r*0.3, b.r*0.1, b.x, b.y, b.r);
  grad.addColorStop(0,'#fff');
  grad.addColorStop(0.5,'#ddd');
  grad.addColorStop(1,'#999');
  ctx.fillStyle=grad;
  ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
  // pentagon pattern
  ctx.fillStyle='#1a1a1a';
  ctx.font=`${b.r*1.2}px Arial`; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('⚽',b.x,b.y);
  ctx.restore();
}

function drawAimLine() {
  const angle = state.aimAngle;
  ctx.save();
  ctx.strokeStyle='rgba(255,255,100,0.7)';
  ctx.lineWidth=3; ctx.setLineDash([8,6]);
  ctx.beginPath();
  ctx.moveTo(BALL_START_X, BALL_START_Y-10);
  const tx=BALL_START_X+Math.sin(angle)*300;
  const ty=BALL_START_Y-10-Math.cos(angle)*300;
  ctx.lineTo(tx,ty);
  ctx.stroke();
  ctx.setLineDash([]);
  // arrowhead
  ctx.fillStyle='rgba(255,255,100,0.9)';
  ctx.beginPath();
  ctx.translate(tx,ty);
  ctx.rotate(angle);
  ctx.moveTo(0,-14); ctx.lineTo(8,0); ctx.lineTo(-8,0);
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

// ─── ANIMATION LOOP ──────────────────────────────────────────────────────────
let lastTime=0, animId=null;
function loop(ts){
  const dt=Math.min((ts-lastTime)/1000,0.05);
  lastTime=ts;
  ctx.clearRect(0,0,W,H);
  updateGoalkeeper(dt);
  if(shooting) updateShot(dt);
  drawScene();
  updateHUD();
  animId=requestAnimationFrame(loop);
}

// ─── SHOT ANIMATION ──────────────────────────────────────────────────────────
let shotT=0;
function updateShot(dt){
  if(shotDone) return;
  shotT += dt;
  const p = clamp(shotT/shotDuration, 0, 1);
  const ease = p < 0.5 ? 2*p*p : -1+(4-2*p)*p;
  // ball moves from start to target (goal center level)
  ballAnim.x = lerp(BALL_START_X, shotTargetX, ease);
  // arc trajectory
  const arcY = lerp(BALL_START_Y, shotTargetY, ease) - Math.sin(p*Math.PI)*120;
  ballAnim.y = arcY;
  ballAnim.r = lerp(18, shotGoal?10:12, ease);
  if(p>=1){
    shotDone=true;
    shooting=false;
    if(shotGoal){
      triggerGoal();
    } else {
      triggerMiss();
    }
  }
}

// ─── INPUT ────────────────────────────────────────────────────────────────────
let dragStart={x:0,y:0}, isDragging=false;
let powerInterval=null, powerDir=1, powerVal=0;

canvas.addEventListener('touchstart', onDown, {passive:false});
canvas.addEventListener('mousedown', onDown);
canvas.addEventListener('touchmove', onMove, {passive:false});
canvas.addEventListener('mousemove', onMove);
canvas.addEventListener('touchend', onUp, {passive:false});
canvas.addEventListener('mouseup', onUp);

function getPos(e){
  const rect=canvas.getBoundingClientRect();
  const scaleX=W/rect.width, scaleY=H/rect.height;
  if(e.touches){
    return {x:(e.touches[0].clientX-rect.left)*scaleX, y:(e.touches[0].clientY-rect.top)*scaleY};
  }
  return {x:(e.clientX-rect.left)*scaleX, y:(e.clientY-rect.top)*scaleY};
}

function onDown(e){
  if(e.cancelable) e.preventDefault();
  if(state.phase!=='idle') return;
  const pos=getPos(e);
  dragStart=pos; isDragging=true;
  state.phase='aiming';
  startPowerBar();
}

function onMove(e){
  if(e.cancelable) e.preventDefault();
  if(!isDragging || state.phase!=='aiming') return;
  const pos=getPos(e);
  const dx=pos.x-BALL_START_X;
  const dy=BALL_START_Y-pos.y;
  state.aimAngle=Math.atan2(dx, Math.max(dy,1));
  state.aimAngle=clamp(state.aimAngle, -Math.PI*0.45, Math.PI*0.45);
}

function onUp(e){
  if(e.cancelable) e.preventDefault();
  if(!isDragging || state.phase!=='aiming') return;
  isDragging=false;
  stopPowerBar();
  shoot();
}

function startPowerBar(){
  powerVal=0; powerDir=1;
  document.getElementById('power-wrap').style.display='flex';
  powerInterval=setInterval(()=>{
    powerVal+=powerDir*3;
    if(powerVal>=100){ powerDir=-1; }
    if(powerVal<=0){ powerDir=1; }
    document.getElementById('power-bar-fill').style.width=powerVal+'%';
  },30);
}
function stopPowerBar(){
  clearInterval(powerInterval);
  document.getElementById('power-wrap').style.display='none';
  state.power=powerVal;
}

// ─── SHOOT ───────────────────────────────────────────────────────────────────
function shoot(){
  if(state.phase!=='aiming') return;
  state.phase='shooting';
  state.kicks++;
  updateBallCounter();

  // compute target point in goal
  const angle=state.aimAngle;
  const rawTX = BALL_START_X + Math.sin(angle)*250;
  const tX = clamp(rawTX, GOAL_X+10, GOAL_X+GOAL_W-10);
  const tY = GOAL_Y + 40 + (1-state.power/100)*GOAL_H*0.6;

  // determine if goal (goalkeeper saves corner-ish shots sometimes)
  const gkDist = Math.abs(tX - state.goalkeeperX);
  const gkReach = 60 + (1-state.power/100)*30;
  const wallBlocked = state.hasFreeKickWall && tX > GOAL_X+GOAL_W*0.25 && tX < GOAL_X+GOAL_W*0.6 && tY > GOAL_Y+GOAL_H*0.3;
  const saved = gkDist < gkReach || wallBlocked;
  const outOfGoal = tX <= GOAL_X || tX >= GOAL_X+GOAL_W;

  shotGoal = !saved && !outOfGoal;
  shotTargetX = tX;
  shotTargetY = tY;

  // zone
  const zoneX = (tX-GOAL_X)/GOAL_W;
  const zoneY = (tY-GOAL_Y)/GOAL_H;
  shotZone = getZoneScore(zoneX, zoneY);

  // simulate goalkeeper dive
  if(shotGoal){
    state.goalkeeperX = lerp(state.goalkeeperX, outOfGoal?state.goalkeeperX:tX-40, 0.3);
  } else {
    state.goalkeeperX = lerp(state.goalkeeperX, tX, 0.85);
  }

  shooting=true; shotDone=false; shotT=0;
}

function triggerGoal(){
  const zone=shotZone;
  state.score += zone.pts;
  state.coins += Math.floor(zone.pts/3);
  state.goalResult=zone;
  flashScreen('rgba(255,255,0,0.3)');
  showFloatScore(zone.pts);
  checkReward();
  if(state.kicks >= state.maxKicks){
    setTimeout(showResult, 900);
  } else {
    document.getElementById('goal-zone-msg').textContent=zone.label;
    document.getElementById('goal-pts').textContent='+'+zone.pts;
    setTimeout(()=>document.getElementById('screen-goal').style.display='flex', 600);
  }
  updateHUD();
}

function triggerMiss(){
  flashScreen('rgba(255,0,0,0.3)');
  if(state.kicks >= state.maxKicks){
    setTimeout(showResult, 900);
  } else {
    setTimeout(()=>document.getElementById('screen-miss').style.display='flex', 600);
  }
}

// ─── REWARD ──────────────────────────────────────────────────────────────────
function checkReward(){
  if(!state.rewardShown && state.score >= state.milestones[0]){
    state.rewardShown=true;
    setTimeout(()=>document.getElementById('screen-reward').style.display='flex', 800);
  }
}

function hideReward(){
  document.getElementById('screen-reward').style.display='none';
  if(state.kicks >= state.maxKicks) showResult();
  else nextKick();
}

// ─── NEXT KICK ───────────────────────────────────────────────────────────────
function nextKick(){
  document.getElementById('screen-goal').style.display='none';
  document.getElementById('screen-miss').style.display='none';
  // reset ball
  ballAnim.x=BALL_START_X; ballAnim.y=BALL_START_Y; ballAnim.r=18;
  state.phase='idle';
  shooting=false; shotDone=false;
  // randomize free kick wall
  state.hasFreeKickWall = Math.random() > 0.55;
  updateDistance();
}

// ─── RESULT ──────────────────────────────────────────────────────────────────
function showResult(){
  document.getElementById('screen-goal').style.display='none';
  document.getElementById('screen-miss').style.display='none';
  const ms=state.milestones;
  let stars=0;
  if(state.score>=ms[0]) stars=1;
  if(state.score>=ms[1]) stars=2;
  if(state.score>=ms[2]) stars=3;
  state.starsEarned=stars;
  const starHtml=['⭐','⭐','⭐'].map((s,i)=>i<stars?'<span style="filter:drop-shadow(0 0 6px #FFD700)">⭐</span>':'<span style="filter:grayscale(1) brightness(0.5)">⭐</span>').join('');
  document.getElementById('result-stars').innerHTML=starHtml;
  document.getElementById('result-score').textContent=`Pontuação: ${state.score}`;
  document.getElementById('result-coins').innerHTML=`🪙 ${state.coins} moedas`;
  document.getElementById('screen-result').style.display='flex';
}

// ─── FLASH & FLOAT ───────────────────────────────────────────────────────────
function flashScreen(color){
  const f=document.getElementById('flash');
  f.style.background=color; f.style.display='block';
  setTimeout(()=>f.style.display='none', 300);
}
function showFloatScore(pts){
  const el=document.createElement('div');
  el.className='float-score';
  el.textContent='+'+pts;
  el.style.left=(W/2-30)+'px'; el.style.top=(GOAL_Y+40)+'px';
  gc.appendChild(el);
  setTimeout(()=>el.remove(), 950);
}

// ─── HUD UPDATE ──────────────────────────────────────────────────────────────
function updateHUD(){
  // stars
  const row=document.getElementById('stars-row');
  row.innerHTML='';
  state.milestones.forEach((m,i)=>{
    const filled=state.score>=m;
    row.innerHTML+=`<div class="star-milestone"><span class="star ${filled?'filled':'empty'}">${filled?'⭐':'☆'}</span><span>${m}</span></div>`;
  });
  document.getElementById('coins-num').textContent=state.coins;
}
function updateBallCounter(){
  document.getElementById('ball-counter').textContent=Math.max(0,state.maxKicks-state.kicks);
}
function updateDistance(){
  const lv=LEVELS[state.levelIdx];
  document.getElementById('distance-label').textContent=lv.label;
}

// ─── GAME FLOW ────────────────────────────────────────────────────────────────
function startGame(){
  document.getElementById('screen-start').style.display='none';
  loadLevel(0);
  if(animId) cancelAnimationFrame(animId);
  lastTime=performance.now();
  animId=requestAnimationFrame(loop);
}

function loadLevel(idx){
  state.levelIdx=idx;
  const lv=LEVELS[idx];
  state.score=0; state.kicks=0; state.maxKicks=lv.kicks;
  state.coins=0; state.milestones=lv.milestones;
  state.phase='idle'; state.rewardShown=false;
  ballAnim.x=BALL_START_X; ballAnim.y=BALL_START_Y; ballAnim.r=18;
  shooting=false; shotDone=false;
  state.hasFreeKickWall=Math.random()>0.5;
  mkGoalkeeper();
  updateBallCounter();
  updateDistance();
  updateHUD();
}

function restartGame(){ loadLevel(state.levelIdx); document.getElementById('screen-result').style.display='none'; }
function nextLevel(){
  document.getElementById('screen-result').style.display='none';
  const nxt=(state.levelIdx+1)%LEVELS.length;
  loadLevel(nxt);
}

// ─── TOUCH DRAG TIP ──────────────────────────────────────────────────────────
window.addEventListener('load', ()=>{
  // initial HUD
  loadLevel(0);
  updateHUD();
  // cancel loop until start
  if(animId){ cancelAnimationFrame(animId); animId=null; }
  // draw static scene
  lastTime=performance.now();
  animId=requestAnimationFrame(ts=>{ lastTime=ts; ctx.clearRect(0,0,W,H); drawScene(); });
});
</script>
</body>
